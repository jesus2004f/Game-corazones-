<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juego 💖</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:sans-serif;
  background:linear-gradient(#ff9a9e,#fad0c4);
}

#startScreen,#gameOver{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.6);
}

.card{
  background:white;
  padding:25px;
  border-radius:20px;
  text-align:center;
  width:80%;
  max-width:320px;
}

button{
  padding:12px;
  border:none;
  border-radius:15px;
  background:#ff4d6d;
  color:white;
  font-size:16px;
  margin-top:10px;
  width:100%;
}

#hud{
  position:absolute;
  top:10px;
  width:100%;
  display:flex;
  justify-content:space-around;
  color:white;
  font-weight:bold;
}

canvas{display:none;}
</style>
</head>

<body>

<div id="startScreen">
  <div class="card">
    <h2>Atrapa corazones</h2>
    <p>Evita bombas 💣</p>
    <button onclick="startGame()">Jugar</button>
  </div>
</div>

<div id="gameOver" style="display:none;">
  <div class="card">
    <h2>Game Over</h2>
    <p id="finalScore"></p>
    <button onclick="location.reload()">Reintentar</button>
  </div>
</div>

<div id="hud">
  <div id="score">0</div>
  <div id="record">0</div>
  <div id="level">Nivel 1</div>
  <div id="misses">❌ 0</div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

// 🖼️ IMÁGENES
const heartImg=new Image();
heartImg.src="img/heart.png";

const goldImg=new Image();
goldImg.src="img/gold.png";

const bombImg=new Image();
bombImg.src="img/bomb.png";

// 🔊 SONIDOS
let catchSound,goldSound,bombSound;

function initSounds(){
  catchSound=new Audio("sound/catch.mp3");
  goldSound=new Audio("sound/gold.mp3");
  bombSound=new Audio("sound/bomb.mp3");
}

let player={x:canvas.width/2,y:canvas.height-70,width:140,height:20};
let items=[];
let score=0;
let record=localStorage.getItem("record")||0;
let level=1;
let spawnRate=1600;
let misses=0;
let maxMisses=10;

document.getElementById("record").innerText=record;

function startGame(){
  initSounds();
  document.getElementById("startScreen").style.display="none";
  canvas.style.display="block";
  spawnLoop();
  gameLoop();
}

function createItem(){
  let r=Math.random();
  let type="heart";
  if(r>0.9) type="bomb";
  else if(r>0.75) type="gold";

  // 💡 CAEN CERCA DEL JUGADOR
  let range=200;
  let x=player.x+(Math.random()*range-range/2);
  x=Math.max(20,Math.min(canvas.width-20,x));

  items.push({
    x:x,
    y:-20,
    size:40,
    speed:2+level*0.5,
    type
  });
}

function drawItem(i){
  let img=heartImg;
  if(i.type==="gold") img=goldImg;
  if(i.type==="bomb") img=bombImg;

  ctx.drawImage(img,i.x-20,i.y-20,40,40);
}

function drawPlayer(){
  ctx.fillStyle="#fff";
  ctx.fillRect(player.x-player.width/2,player.y,player.width,player.height);
}

function updateItems(){
  for(let i=items.length-1;i>=0;i--){
    let it=items[i];
    it.y+=it.speed;

    // 🎯 COLISIÓN
    if(it.y>player.y &&
       it.x>player.x-player.width/2 &&
       it.x<player.x+player.width/2){

      if(it.type==="bomb"){
        bombSound.currentTime=0;
        bombSound.play();
        endGame();
        return;
      }

      if(it.type==="gold"){
        score+=3;
        goldSound.currentTime=0;
        goldSound.play();
      }else{
        score++;
        catchSound.currentTime=0;
        catchSound.play();
      }

      updateLevel();
      updateRecord();
      items.splice(i,1);
      continue;
    }

    // ❌ FALLOS CORREGIDOS
    if(it.y > canvas.height){
      if(it.y > player.y + 50){
        misses++;
      }
      items.splice(i,1);
    }
  }

  document.getElementById("score").innerText=score;
  document.getElementById("misses").innerText="❌ "+misses;
}

function updateLevel(){
  if(score>=30) level=3;
  else if(score>=15) level=2;

  document.getElementById("level").innerText="Nivel "+level;
  spawnRate=1600-level*300;
}

function updateRecord(){
  if(score>record){
    record=score;
    localStorage.setItem("record",record);
    document.getElementById("record").innerText=record;
  }
}

function spawnLoop(){
  createItem();
  setTimeout(spawnLoop,spawnRate);
}

function gameLoop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  drawPlayer();
  items.forEach(drawItem);
  updateItems();

  if(misses < maxMisses){
    requestAnimationFrame(gameLoop);
  }else{
    endGame();
  }
}

function endGame(){
  document.getElementById("gameOver").style.display="flex";
  document.getElementById("finalScore").innerText="Puntos: "+score;
}

// 🎮 CONTROLES
canvas.addEventListener("mousemove",e=>player.x=e.clientX);
canvas.addEventListener("touchmove",e=>player.x=e.touches[0].clientX);
</script>

</body>
</html>
