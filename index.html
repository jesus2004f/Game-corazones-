<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juego PRO 💖</title>

<style>
body {
  margin:0;
  overflow:hidden;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(#ff9a9e,#fad0c4);
}

/* INICIO */
#startScreen, #gameOver {
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  background: rgba(0,0,0,0.6);
  z-index:10;
}

.card{
  background:white;
  padding:30px;
  border-radius:20px;
  text-align:center;
  width:80%;
  max-width:350px;
}

button{
  padding:15px;
  border:none;
  border-radius:15px;
  background:#ff4d6d;
  color:white;
  font-size:18px;
  margin-top:15px;
  width:100%;
}

#hud{
  position:absolute;
  top:10px;
  width:100%;
  display:flex;
  justify-content:space-around;
  color:white;
  font-weight:bold;
}

#message{
  position:absolute;
  top:25%;
  width:100%;
  text-align:center;
  font-size:24px;
  color:white;
  opacity:0;
  transition:.5s;
}
canvas{display:none;}
</style>
</head>

<body>

<div id="startScreen">
  <div class="card">
    <h2>💖 Atrapa corazones</h2>
    <p>Evita bombas 💣 y consigue récord</p>
    <button onclick="startGame()">Jugar</button>
  </div>
</div>

<div id="gameOver" style="display:none;">
  <div class="card">
    <h2>💔 Game Over</h2>
    <p id="finalScore"></p>
    <button onclick="location.reload()">Reintentar</button>
  </div>
</div>

<div id="hud">
  <div id="score">💖 0</div>
  <div id="record">🏆 0</div>
  <div id="level">Nivel 1</div>
</div>

<div id="message"></div>
<canvas id="gameCanvas"></canvas>

<script>
const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

let player={x:canvas.width/2,y:canvas.height-70,width:140,height:20};
let items=[],particles=[];
let score=0;
let record=localStorage.getItem("record")||0;
let level=1;
let spawnRate=1600;
let misses=0;

document.getElementById("record").innerText="🏆 "+record;

/* SONIDOS */
const catchSound=new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg");
const goldSound=new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
const bombSound=new Audio("https://actions.google.com/sounds/v1/explosions/explosion.ogg");

function startGame(){
  document.getElementById("startScreen").style.display="none";
  canvas.style.display="block";
  spawnLoop();
  gameLoop();
}

function createItem(){
  let r=Math.random();
  let type="heart";
  if(r>0.9) type="bomb";
  else if(r>0.75) type="gold";

  items.push({
    x:Math.random()*canvas.width,
    y:-20,
    size:18,
    speed:2+level*0.6,
    type
  });
}

function drawItem(i){
  if(i.type==="heart") ctx.fillStyle="red";
  else if(i.type==="gold") ctx.fillStyle="gold";
  else ctx.fillStyle="black";

  ctx.beginPath();
  ctx.arc(i.x,i.y,i.size,0,Math.PI*2);
  ctx.fill();
}

function drawPlayer(){
  ctx.fillStyle="#fff";
  ctx.fillRect(player.x-player.width/2,player.y,player.width,player.height);
}

/* PARTÍCULAS */
function createParticles(x,y,color){
  for(let i=0;i<10;i++){
    particles.push({
      x,y,
      dx:(Math.random()-0.5)*4,
      dy:(Math.random()-0.5)*4,
      life:30,
      color
    });
  }
}

function drawParticles(){
  particles.forEach(p=>{
    p.x+=p.dx;
    p.y+=p.dy;
    p.life--;
    ctx.fillStyle=p.color;
    ctx.fillRect(p.x,p.y,3,3);
  });
  particles=particles.filter(p=>p.life>0);
}

function updateItems(){
  for(let i=items.length-1;i>=0;i--){
    let it=items[i];
    it.y+=it.speed;

    if(it.y>player.y &&
       it.x>player.x-player.width/2 &&
       it.x<player.x+player.width/2){

      if(it.type==="bomb"){
        bombSound.play();
        endGame();
        return;
      }

      if(it.type==="gold"){
        score+=3;
        goldSound.play();
        createParticles(it.x,it.y,"gold");
      }else{
        score++;
        catchSound.play();
        createParticles(it.x,it.y,"red");
      }

      updateLevel();
      updateRecord();
      items.splice(i,1);
      continue;
    }

    if(it.y>canvas.height){
      misses++;
      items.splice(i,1);
    }
  }

  document.getElementById("score").innerText="💖 "+score;
}

function updateLevel(){
  if(score>=30) level=3;
  else if(score>=15) level=2;

  document.getElementById("level").innerText="Nivel "+level;
  spawnRate=1600-level*350;
}

function updateRecord(){
  if(score>record){
    record=score;
    localStorage.setItem("record",record);
    document.getElementById("record").innerText="🏆 "+record;
    showMessage("Nuevo récord 🔥");
  }
}

function showMessage(text){
  const msg=document.getElementById("message");
  msg.innerText=text;
  msg.style.opacity=1;
  setTimeout(()=>msg.style.opacity=0,2000);
}

function spawnLoop(){
  createItem();
  setTimeout(spawnLoop,spawnRate);
}

function endGame(){
  document.getElementById("gameOver").style.display="flex";
  document.getElementById("finalScore").innerText="Puntos: "+score;
}

function gameLoop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  drawPlayer();
  items.forEach(drawItem);
  updateItems();
  drawParticles();

  if(misses<5){
    requestAnimationFrame(gameLoop);
  }else{
    endGame();
  }
}

canvas.addEventListener("mousemove",e=>player.x=e.clientX);
canvas.addEventListener("touchmove",e=>player.x=e.touches[0].clientX);
</script>

</body>
</html>
