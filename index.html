<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 Para ti 💖</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(180deg, #ff9a9e, #fad0c4);
}

/* Pantalla inicio bonita */
#startScreen {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #ff6f91, #ff9671);
  display: flex;
  justify-content: center;
  align-items: center;
}

.card {
  background: white;
  padding: 30px;
  border-radius: 25px;
  text-align: center;
  width: 85%;
  max-width: 350px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

h1 { color: #ff4d6d; }
p { color: #555; }

button {
  padding: 15px;
  border: none;
  border-radius: 20px;
  background: #ff4d6d;
  color: white;
  font-size: 18px;
  margin-top: 15px;
  width: 100%;
}

/* HUD */
#hud {
  position: absolute;
  top: 10px;
  width: 100%;
  display: flex;
  justify-content: space-around;
  color: white;
  font-weight: bold;
}

#message {
  position: absolute;
  top: 25%;
  width: 100%;
  text-align: center;
  font-size: 24px;
  color: white;
  opacity: 0;
  transition: 0.5s;
}

canvas { display: none; }
</style>
</head>

<body>

<div id="startScreen">
  <div class="card">
    <h1>💖 Para ti 💖</h1>
    <p>
    Atrapa los corazones ❤️<br>
    No dejes caer más de 5 😢<br>
    Disfrútalo 💕
    </p>
    <button onclick="startGame()">Jugar 💘</button>
  </div>
</div>

<div id="hud">
  <div id="score">💖 0</div>
  <div id="record">🏆 0</div>
</div>

<div id="message"></div>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let player = {
  x: canvas.width / 2,
  y: canvas.height - 70,
  width: 140,
  height: 20
};

let hearts = [];
let flowers = [];
let score = 0;
let record = 0;
let misses = 0;
let spawnRate = 1800; // MÁS LENTO

const messages = [
  "💖 Eres muy especial",
  "✨ Eres increíble",
  "🌸 Sonríe hermosa",
  "💞 Me encantas",
  "🌷 Eres única"
];

function startGame() {
  document.getElementById("startScreen").style.display = "none";
  canvas.style.display = "block";
  spawnLoop();
  gameLoop();
}

// GENERA CERCA DEL JUGADOR (CLAVE)
function createHeart() {
  let range = 150; // rango pequeño
  let x = player.x + (Math.random() * range - range/2);

  hearts.push({
    x: Math.max(20, Math.min(canvas.width-20, x)),
    y: -20,
    size: 18,
    speed: 2
  });
}

function drawHeart(x, y, size) {
  ctx.fillStyle = "red";
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.bezierCurveTo(x - size, y - size, x - size*2, y + size/2, x, y + size*2);
  ctx.bezierCurveTo(x + size*2, y + size/2, x + size, y - size, x, y);
  ctx.fill();
}

function drawPlayer() {
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(player.x - player.width/2, player.y, player.width, player.height);
}

function updateHearts() {
  for (let i = hearts.length - 1; i >= 0; i--) {
    let h = hearts[i];
    h.y += h.speed;

    if (
      h.y + h.size > player.y &&
      h.x > player.x - player.width/2 &&
      h.x < player.x + player.width/2
    ) {
      score++;
      document.getElementById("score").innerText = "💖 " + score;

      if (score > record) {
        record = score;
        document.getElementById("record").innerText = "🏆 " + record;
        showMessage();
        spawnFlowers();
      }

      hearts.splice(i,1);
      continue;
    }

    if (h.y > canvas.height) {
      misses++;
      hearts.splice(i,1);
    }
  }
}

function drawHearts() {
  hearts.forEach(h => drawHeart(h.x, h.y, h.size));
}

function spawnFlowers() {
  for (let i = 0; i < 12; i++) {
    flowers.push({
      x: Math.random()*canvas.width,
      y: canvas.height,
      speed: 2
    });
  }
}

function drawFlowers() {
  ctx.fillStyle = "pink";
  flowers.forEach(f => {
    f.y -= f.speed;
    ctx.beginPath();
    ctx.arc(f.x, f.y, 5, 0, Math.PI*2);
    ctx.fill();
  });
}

function showMessage() {
  const msg = document.getElementById("message");
  msg.innerText = messages[Math.floor(Math.random()*messages.length)];
  msg.style.opacity = 1;
  setTimeout(()=> msg.style.opacity = 0, 2000);
}

// CONTROL DE SPAWN INTELIGENTE
function spawnLoop() {
  createHeart();

  // aumenta dificultad poquito a poquito
  if (spawnRate > 900) spawnRate -= 10;

  setTimeout(spawnLoop, spawnRate);
}

function gameLoop() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  drawPlayer();
  drawHearts();
  drawFlowers();
  updateHearts();

  if (misses < 5) {
    requestAnimationFrame(gameLoop);
  } else {
    alert("💔 Game Over\nPuntos: " + score);
    location.reload();
  }
}

// CONTROLES SUAVES
canvas.addEventListener("mousemove", e => {
  player.x = e.clientX;
});

canvas.addEventListener("touchmove", e => {
  player.x = e.touches[0].clientX;
});
</script>

</body>
</html>
