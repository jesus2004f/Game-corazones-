<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 Juego de Amor 💖</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
}

#startScreen {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  flex-direction: column;
}

button {
  padding: 15px 25px;
  font-size: 18px;
  border-radius: 20px;
  border: none;
  background: #ff6f91;
  color: white;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

#gameCanvas {
  display: none;
}

#message {
  position: absolute;
  top: 20%;
  width: 100%;
  text-align: center;
  font-size: 22px;
  color: white;
  opacity: 0;
  transition: opacity 1s;
}

</style>
</head>

<body>

<div id="startScreen">
  <h1>💖 Atrapa los corazones 💖</h1>
  <p>
  Atrapa los corazones ❤️<br>
  No dejes caer más de 5 😢<br>
  ¡Diviértete!
  </p>
  <button onclick="startGame()">Jugar</button>
</div>

<div id="message"></div>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let player = {
  x: canvas.width / 2 - 60,
  y: canvas.height - 70,
  width: 120,
  height: 20
};

let hearts = [];
let flowers = [];
let score = 0;
let highScore = 0;
let misses = 0;

const messages = [
  "💖 Eres increíble",
  "🌸 Eres muy especial",
  "✨ Nunca olvides lo linda que eres",
  "💘 Sonríe, iluminas todo",
  "🌷 Eres única",
  "💞 Sigue así, lo haces genial"
];

function startGame() {
  document.getElementById("startScreen").style.display = "none";
  canvas.style.display = "block";
  gameLoop();
}

function createHeart() {
  hearts.push({
    x: Math.random() * canvas.width,
    y: 0,
    size: 15 + Math.random() * 10,
    speed: 2 + Math.random() * 1.5
  });
}

function createFlowers() {
  for (let i = 0; i < 10; i++) {
    flowers.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: 5 + Math.random() * 10
    });
  }
}

function showMessage() {
  const msg = document.getElementById("message");
  msg.innerText = messages[Math.floor(Math.random() * messages.length)];
  msg.style.opacity = 1;
  setTimeout(() => msg.style.opacity = 0, 2000);
}

function drawPlayer() {
  ctx.fillStyle = "#ffffffcc";
  ctx.fillRect(player.x, player.y, player.width, player.height);
}

function drawHearts() {
  hearts.forEach(h => {
    ctx.fillStyle = "red";
    ctx.beginPath();
    ctx.moveTo(h.x, h.y);

    ctx.bezierCurveTo(h.x - h.size, h.y - h.size,
                      h.x - h.size * 2, h.y + h.size / 2,
                      h.x, h.y + h.size * 2);

    ctx.bezierCurveTo(h.x + h.size * 2, h.y + h.size / 2,
                      h.x + h.size, h.y - h.size,
                      h.x, h.y);

    ctx.fill();
  });
}

function drawFlowers() {
  ctx.fillStyle = "pink";
  flowers.forEach(f => {
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.size, 0, Math.PI * 2);
    ctx.fill();
  });
}

function updateHearts() {
  for (let i = hearts.length - 1; i >= 0; i--) {
    let h = hearts[i];
    h.y += h.speed;

    if (
      h.y > player.y &&
      h.x > player.x &&
      h.x < player.x + player.width
    ) {
      score++;

      if (score > highScore) {
        highScore = score;
        createFlowers();
        showMessage();
      }

      hearts.splice(i, 1);
    } else if (h.y > canvas.height) {
      misses++;
      hearts.splice(i, 1);
    }
  }
}

function drawText() {
  ctx.fillStyle = "white";
  ctx.font = "20px Segoe UI";
  ctx.fillText("💖 Puntos: " + score, 20, 30);
  ctx.fillText("🏆 Récord: " + highScore, 20, 60);
}

function gameLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawPlayer();
  drawHearts();
  drawFlowers();
  updateHearts();
  drawText();

  if (misses < 5) {
    requestAnimationFrame(gameLoop);
  } else {
    alert("💔 Game Over\nPuntos: " + score);
    location.reload();
  }
}

setInterval(createHeart, 1400);

canvas.addEventListener("touchmove", e => {
  player.x = e.touches[0].clientX - player.width / 2;
});

canvas.addEventListener("mousemove", e => {
  player.x = e.clientX - player.width / 2;
});
</script>

</body>
</html>
